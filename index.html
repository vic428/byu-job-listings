<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs — BYU Pathway Worldwide</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============================================================
       HEADER — mirrors Power Pages Header web template
  ============================================================ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo-accent"></div>
        <div class="logo-text">
          <span class="logo-byu">BYU</span>
          <span class="logo-pathway">PATHWAY</span>
          <span class="logo-worldwide">WORLDWIDE</span>
        </div>
      </div>

      <nav class="top-nav" aria-label="Primary">
        <a href="#" class="nav-link">Home</a>
        <a href="index.html" class="nav-link active">Browse Jobs</a>
        <a href="#" class="nav-link">About</a>
      </nav>

      <div class="header-ctas">
        <a href="#" class="btn-find-job">Find a Job</a>
      </div>
    </div>
  </header>


  <!-- ============================================================
       MAIN
  ============================================================ -->
  <main class="page-main">

    <div class="page-title">
      <h1>Browse Jobs</h1>
      <p id="resultsCount" class="results-count">Loading…</p>
    </div>

    <div class="page-body">

      <!-- LEFT SIDEBAR -->
      <aside class="filter-sidebar">
        <h2 class="sidebar-heading">Filters</h2>

        <div class="filter-group">
          <label class="filter-label" for="kw">Keyword</label>
          <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input class="filter-input" id="kw" type="text" placeholder="Title, company…" />
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Program</label>
          <div class="pill-group" id="programPills">
            <button class="pill active" data-value="">All</button>
            <button class="pill" data-value="Business Management">Business</button>
            <button class="pill" data-value="Health Informatics">Health</button>
            <button class="pill" data-value="Computer Science">Technology</button>
            <button class="pill" data-value="Accounting">Accounting</button>
            <button class="pill" data-value="Marketing">Marketing</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Job Type</label>
          <div class="pill-group" id="positionPills">
            <button class="pill active" data-value="">All</button>
            <button class="pill" data-value="Full-time">Full-time</button>
            <button class="pill" data-value="Part-time">Part-time</button>
            <button class="pill" data-value="Contract">Contract</button>
            <button class="pill" data-value="Internship">Internship</button>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label" for="location">Location</label>
          <div class="select-wrap">
            <select class="filter-select" id="location">
              <option value="">All</option>
              <option value="Remote">Remote</option>
              <option value="Hybrid">Hybrid</option>
              <option value="On-site">On-site</option>
              <option value="Americas">Americas</option>
              <option value="Africa">Africa</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>

        <button class="btn-clear" id="clearBtn">Clear all filters</button>
      </aside>

      <!-- RIGHT RESULTS -->
      <section class="results-panel">
        <div class="job-grid" id="jobGrid"></div>
        <nav class="pagination" id="pagination"></nav>
      </section>

    </div>
  </main>


  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-col">
        <h4>BYU Pathway</h4>
        <a href="#">About Us</a>
        <a href="#">Programs</a>
        <a href="#">Employer Partners</a>
      </div>
      <div class="footer-col">
        <h4>Resources</h4>
        <a href="#">Resume Builder</a>
        <a href="#">Career Coaching</a>
        <a href="#">Interview Prep</a>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <a href="mailto:support@byupathway.org">support@byupathway.org</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Use</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
